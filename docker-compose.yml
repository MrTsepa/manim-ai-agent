services:
  video-studio:
    build:
      context: .
      dockerfile: Dockerfile
      ssh:
        - default
      args:
        # Repository URL to clone (required)
        REPO_URL: ${REPO_URL:-https://github.com/your-org/ai-video-studio.git}
        # Optional: branch or ref to checkout
        REPO_BRANCH: ${REPO_BRANCH:-main}
        REPO_REF: ${REPO_REF:-HEAD}
    container_name: ai-video-studio
    environment:
      # Agent ID for multiagent workflows
      - AGENT_ID=${AGENT_ID:-default}
      # OpenAI API key (required for GPT-5.2 critique script and Codex SDK)
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # Optional: OpenAI model override
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-5.2}
      # SSH agent forwarding for GitHub access
      - SSH_AUTH_SOCK=${SSH_AUTH_SOCK}
    volumes:
      # Optional: Mount project directory for development (overrides cloned repo)
      # - .:/workspace
      # SSH agent socket for forwarding (macOS Docker Desktop: /run/host-services/ssh-auth.sock)
      - ${SSH_AUTH_SOCK:-/run/host-services/ssh-auth.sock}:${SSH_AUTH_SOCK:-/run/host-services/ssh-auth.sock}
      # Persist output videos
      - ./output:/workspace/output
      # Persist agent scratchpad
      - ./agent_scratchpad:/workspace/agent_scratchpad
      # Persist samples artifacts
      - ./samples_artifacts:/workspace/samples_artifacts
    working_dir: /workspace
    stdin_open: true
    tty: true
    # Keep container running
    command: bash

