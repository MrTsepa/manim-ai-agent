version: 1
notes:
  - "Do not reference agent_scratchpad in this library. It is temporary and not stable across sessions."
reference_scenes:
  - id: parabolic_motion_v1
    title: "Parabolic Motion"
    scene_class: "ParabolicMotionScene"
    module: "ai_video_studio.manim_scenes.demo_scenes"
    source_file: "src/ai_video_studio/manim_scenes/demo_scenes.py"
    tags:
      - reference
      - layout:side-by-side
      - plots:kinematics
      - alignment:axes
      - title:top-center
    quality_notes:
      - "Clean right-side plot alignment and label column alignment."
      - "Balanced left trajectory with right stacked plots."
      - "Title has comfortable spacing from top plot."
    artifacts:
      video_low_quality: "output/videos/480p15/ParabolicMotionScene.mp4"
      review_gif: "samples_artifacts/parabolic_motion_review.gif"
      review_frames:
        - "samples_artifacts/parabolic_frame_3s.png"
        - "samples_artifacts/parabolic_frame_6s.png"
        - "samples_artifacts/parabolic_frame_10s.png"
  - id: pythagorean_theorem_v1
    title: "Pythagorean Theorem"
    scene_class: "PythagoreanTheoremScene"
    module: "ai_video_studio.manim_scenes.demo_scenes"
    source_file: "src/ai_video_studio/manim_scenes/demo_scenes.py"
    tags:
      - sample
      - geometry
      - layout:split
      - title:top-center
      - equation
      - highlight
    quality_notes:
      - "Centered layout with title clearance."
      - "Squares and equation highlight in sync."
      - "Diagram labels sized to match equation."
    artifacts:
      video_low_quality: "output/videos/480p15/PythagoreanTheoremScene.mp4"
      review_gif: "samples_artifacts/pythagorean_review.gif"
      review_frames:
        - "samples_artifacts/pythagorean_frame_2s.png"
        - "samples_artifacts/pythagorean_frame_5s.png"
  - id: secant_to_derivative_v1
    title: "Secant → Derivative"
    scene_class: "SecantToDerivativeScene"
    module: "ai_video_studio.manim_scenes.scenes.secant_to_derivative"
    source_file: "src/ai_video_studio/manim_scenes/scenes/secant_to_derivative.py"
    tags:
      - calculus
      - secant
      - derivative
      - layout:side-by-side
      - title:top-center
      - text:explanatory
      - plot:dynamic
    quality_notes:
      - "Left explanatory text block fades in as a unit with uniform line spacing."
      - "Left block is vertically centered between title and bottom edge for balanced composition."
      - "Plot shifted down and slightly left to avoid title collisions at maximum extent."
      - "Δx/Δy brackets anchored to axes with offsets to avoid tick label overlap."
      - "Secant line rendered as a continuous line that fades in, converging to the tangent."
      - "Moving point label stays right-aligned with a downward bias to avoid curve intersection."
    artifacts:
      video_low_quality: "output/videos/480p15/SecantToDerivativeScene.mp4"
      review_gif: "samples_artifacts/secant_to_derivative_review.gif"
      review_frames:
        - "samples_artifacts/secant_to_derivative_frame_3s.png"
        - "samples_artifacts/secant_to_derivative_frame_6s.png"
        - "samples_artifacts/secant_to_derivative_frame_10s.png"
